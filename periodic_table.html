<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of Elements</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --text-primary: #1a1a18;
    --text-secondary: #5a5a56;
    --text-tertiary: #9a9a94;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --shadow: 0 4px 16px rgba(0,0,0,0.10);
    --shadow-hover: 0 8px 28px rgba(0,0,0,0.18);
    --radius: 6px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;

    --alkali:     #FAECE7; --alkali-b:   #F09975; --alkali-t:   #712B13;
    --aearth:     #FAEEDA; --aearth-b:   #EF9F27; --aearth-t:   #633806;
    --tmetal:     #E6F1FB; --tmetal-b:   #85B7EB; --tmetal-t:   #0C447C;
    --pmetal:     #EAF3DE; --pmetal-b:   #97C459; --pmetal-t:   #27500A;
    --metalloid:  #EEEDFE; --metalloid-b:#AFA9EC; --metalloid-t:#3C3489;
    --nonmetal:   #E1F5EE; --nonmetal-b: #5DCAA5; --nonmetal-t: #085041;
    --halogen:    #FBEAF0; --halogen-b:  #ED93B1; --halogen-t:  #72243E;
    --noble:      #F1EFE8; --noble-b:    #B4B2A9; --noble-t:    #444441;
    --lantha:     #FCEBEB; --lantha-b:   #F09595; --lantha-t:   #791F1F;
    --actini:     #FFF3E0; --actini-b:   #FFB74D; --actini-t:   #6D4C00;
    --unknown:    #F1EFE8; --unknown-b:  #D3D1C7; --unknown-t:  #5F5E5A;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --bg2: #242420;
      --text-primary: #e8e6de;
      --text-secondary: #a0a098;
      --text-tertiary: #606058;
      --border: rgba(255,255,255,0.10);
      --border-hover: rgba(255,255,255,0.22);
      --shadow: 0 4px 16px rgba(0,0,0,0.35);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.5);

      --alkali:     #4A1B0C; --alkali-b:   #993C1D; --alkali-t:   #F5C4B3;
      --aearth:     #412402; --aearth-b:   #854F0B; --aearth-t:   #FAC775;
      --tmetal:     #042C53; --tmetal-b:   #185FA5; --tmetal-t:   #B5D4F4;
      --pmetal:     #173404; --pmetal-b:   #3B6D11; --pmetal-t:   #C0DD97;
      --metalloid:  #26215C; --metalloid-b:#534AB7; --metalloid-t:#CECBF6;
      --nonmetal:   #04342C; --nonmetal-b: #0F6E56; --nonmetal-t: #9FE1CB;
      --halogen:    #4B1528; --halogen-b:  #993556; --halogen-t:  #F4C0D1;
      --noble:      #2C2C2A; --noble-b:    #5F5E5A; --noble-t:    #D3D1C7;
      --lantha:     #501313; --lantha-b:   #A32D2D; --lantha-t:   #F7C1C1;
      --actini:     #3E2000; --actini-b:   #8B5500; --actini-t:   #FFCC80;
      --unknown:    #2C2C2A; --unknown-b:  #444441; --unknown-t:  #B4B2A9;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 16px 40px;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 5px 14px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .leg-sq {
    width: 11px;
    height: 11px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid transparent;
  }

  .leg-sq.alkali    { background: var(--alkali);    border-color: var(--alkali-b); }
  .leg-sq.aearth    { background: var(--aearth);    border-color: var(--aearth-b); }
  .leg-sq.tmetal    { background: var(--tmetal);    border-color: var(--tmetal-b); }
  .leg-sq.pmetal    { background: var(--pmetal);    border-color: var(--pmetal-b); }
  .leg-sq.metalloid { background: var(--metalloid); border-color: var(--metalloid-b); }
  .leg-sq.nonmetal  { background: var(--nonmetal);  border-color: var(--nonmetal-b); }
  .leg-sq.halogen   { background: var(--halogen);   border-color: var(--halogen-b); }
  .leg-sq.noble     { background: var(--noble);     border-color: var(--noble-b); }
  .leg-sq.lantha    { background: var(--lantha);    border-color: var(--lantha-b); }
  .leg-sq.actini    { background: var(--actini);    border-color: var(--actini-b); }

  .pt-wrap {
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(36px, 1fr));
    gap: 2px;
    min-width: 700px;
  }

  .cell {
    border-radius: var(--radius);
    padding: 3px 2px 2px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    border: 1px solid transparent;
    aspect-ratio: 1 / 1.1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    user-select: none;
    position: relative;
  }

  .cell:hover {
    transform: scale(1.22);
    z-index: 20;
    box-shadow: var(--shadow-hover);
    filter: brightness(1.05);
  }

  .cell.alkali    { background: var(--alkali);    border-color: var(--alkali-b);    color: var(--alkali-t); }
  .cell.aearth    { background: var(--aearth);    border-color: var(--aearth-b);    color: var(--aearth-t); }
  .cell.tmetal    { background: var(--tmetal);    border-color: var(--tmetal-b);    color: var(--tmetal-t); }
  .cell.pmetal    { background: var(--pmetal);    border-color: var(--pmetal-b);    color: var(--pmetal-t); }
  .cell.metalloid { background: var(--metalloid); border-color: var(--metalloid-b); color: var(--metalloid-t); }
  .cell.nonmetal  { background: var(--nonmetal);  border-color: var(--nonmetal-b);  color: var(--nonmetal-t); }
  .cell.halogen   { background: var(--halogen);   border-color: var(--halogen-b);   color: var(--halogen-t); }
  .cell.noble     { background: var(--noble);     border-color: var(--noble-b);     color: var(--noble-t); }
  .cell.lantha    { background: var(--lantha);    border-color: var(--lantha-b);    color: var(--lantha-t); }
  .cell.actini    { background: var(--actini);    border-color: var(--actini-b);    color: var(--actini-t); }
  .cell.unknown   { background: var(--unknown);   border-color: var(--unknown-b);   color: var(--unknown-t); }

  .cell .num  { font-size: 8px; opacity: 0.72; line-height: 1; }
  .cell .sym  { font-size: 13px; font-weight: 600; line-height: 1.15; }
  .cell .name { font-size: 5.5px; opacity: 0.80; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .cell .mass { font-size: 5.5px; opacity: 0.65; line-height: 1; }

  .spacer { aspect-ratio: 1 / 1.1; }

  .la-placeholder {
    aspect-ratio: 1 / 1.1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7.5px;
    color: var(--text-tertiary);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    text-align: center;
    line-height: 1.3;
  }

  .gap-row  { grid-column: span 18; height: 3px; }
  .sep-row  { grid-column: span 18; height: 8px; }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--bg);
    border: 1px solid var(--border-hover);
    border-radius: 10px;
    padding: 12px 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.14s;
    z-index: 9999;
    min-width: 170px;
    box-shadow: var(--shadow);
  }
  .tooltip.show { opacity: 1; }
  .tt-sym  { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .tt-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-top: 2px; }
  .tt-row  { font-size: 11px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }
  .tt-key  { color: var(--text-tertiary); }
  .tt-badge {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid transparent;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.38);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 30px;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    transform: scale(0.96);
    transition: transform 0.18s;
    position: relative;
  }
  .modal-overlay.show .modal { transform: scale(1); }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--text-tertiary); line-height: 1;
  }
  .modal-close:hover { color: var(--text-primary); }
  .modal-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
  .modal-sym-box {
    width: 64px; height: 70px;
    border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1.5px solid transparent;
  }
  .modal-sym-box .num { font-size: 11px; opacity: 0.72; }
  .modal-sym-box .sym { font-size: 26px; font-weight: 700; line-height: 1.1; }
  .modal-sym-box .mass { font-size: 9px; opacity: 0.68; }
  .modal-title { flex: 1; }
  .modal-title h2 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
  .modal-title .cat { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .modal-props { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .prop { background: var(--bg2); border-radius: 8px; padding: 10px 12px; }
  .prop-key { font-size: 10px; color: var(--text-tertiary); margin-bottom: 2px; }
  .prop-val { font-size: 13px; font-weight: 500; color: var(--text-primary); }

  @media (max-width: 600px) {
    body { padding: 12px 8px 32px; }
    h1 { font-size: 15px; }
    .cell .sym { font-size: 11px; }
  }
</style>
</head>
<body>

<h1>Periodic Table of Elements</h1>

<div class="legend">
  <div class="leg"><div class="leg-sq alkali"></div>Alkali metal</div>
  <div class="leg"><div class="leg-sq aearth"></div>Alkaline earth</div>
  <div class="leg"><div class="leg-sq tmetal"></div>Transition metal</div>
  <div class="leg"><div class="leg-sq pmetal"></div>Post-transition</div>
  <div class="leg"><div class="leg-sq metalloid"></div>Metalloid</div>
  <div class="leg"><div class="leg-sq nonmetal"></div>Nonmetal</div>
  <div class="leg"><div class="leg-sq halogen"></div>Halogen</div>
  <div class="leg"><div class="leg-sq noble"></div>Noble gas</div>
  <div class="leg"><div class="leg-sq lantha"></div>Lanthanide</div>
  <div class="leg"><div class="leg-sq actini"></div>Actinide</div>
</div>

<div class="pt-wrap">
  <div class="grid" id="pt"></div>
</div>

<div class="tooltip" id="tt">
  <div class="tt-sym" id="tt-sym"></div>
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-row"><span class="tt-key">Atomic #: </span><span id="tt-num"></span></div>
  <div class="tt-row"><span class="tt-key">Atomic mass: </span><span id="tt-mass"></span></div>
  <div class="tt-row"><span class="tt-key">Period/Group: </span><span id="tt-pg"></span></div>
  <div><span class="tt-badge" id="tt-badge"></span></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">&times;</button>
    <div class="modal-header">
      <div class="modal-sym-box" id="m-symbox">
        <div class="num" id="m-num"></div>
        <div class="sym" id="m-sym"></div>
        <div class="mass" id="m-mass"></div>
      </div>
      <div class="modal-title">
        <h2 id="m-name"></h2>
        <div class="cat" id="m-cat"></div>
      </div>
    </div>
    <div class="modal-props">
      <div class="prop"><div class="prop-key">Period</div><div class="prop-val" id="m-period"></div></div>
      <div class="prop"><div class="prop-key">Group</div><div class="prop-val" id="m-group"></div></div>
      <div class="prop"><div class="prop-key">Atomic number</div><div class="prop-val" id="m-anum"></div></div>
      <div class="prop"><div class="prop-key">Atomic mass</div><div class="prop-val" id="m-amass"></div></div>
      <div class="prop"><div class="prop-key">Block</div><div class="prop-val" id="m-block"></div></div>
      <div class="prop"><div class="prop-key">State (STP)</div><div class="prop-val" id="m-state"></div></div>
    </div>
  </div>
</div>

];

const CAT_LABELS = {
  alkali:'Alkali metal', aearth:'Alkaline earth', tmetal:'Transition metal',
  pmetal:'Post-transition', metalloid:'Metalloid', nonmetal:'Nonmetal',
  halogen:'Halogen', noble:'Noble gas', lantha:'Lanthanide', actini:'Actinide', unknown:'Unknown'
};

// Build row/col map
const map = {};
ELEMENTS.forEach(e => {
  const r = e[6], c = e[7];
  if (!map[r]) map[r] = {};
  map[r][c] = e;
});

const grid = document.getElementById('pt');
const tt = document.getElementById('tt');

function getBadgeStyle(cls) {
  const styles = document.documentElement.style;
  return `background:var(--${cls});border-color:var(--${cls}-b);color:var(--${cls}-t)`;
}

function makeCell(e) {
  const d = document.createElement('div');
  d.className = 'cell ' + e[4];
  d.innerHTML = `<div class="num">${e[0]}</div><div class="sym">${e[1]}</div><div class="name">${e[2]}</div><div class="mass">${e[3]}</div>`;

  d.addEventListener('mouseenter', ev => {
    document.getElementById('tt-sym').textContent = e[1];
    document.getElementById('tt-name').textContent = e[2];
    document.getElementById('tt-num').textContent = e[0];
    document.getElementById('tt-mass').textContent = e[3] + ' u';
    document.getElementById('tt-pg').textContent = 'Period ' + e[6] + ', Group ' + e[7];
    const badge = document.getElementById('tt-badge');
    badge.textContent = CAT_LABELS[e[4]] || e[5];
    badge.style.cssText = getBadgeStyle(e[4]);
    tt.classList.add('show');
    posTooltip(ev);
  });
  d.addEventListener('mousemove', posTooltip);
  d.addEventListener('mouseleave', () => tt.classList.remove('show'));
  d.addEventListener('click', () => openModal(e));
  return d;
}

function posTooltip(ev) {
  let x = ev.clientX + 16, y = ev.clientY - 20;
  if (x + 180 > window.innerWidth) x = ev.clientX - 196;
  if (y + 160 > window.innerHeight) y = ev.clientY - 170;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function openModal(e) {
  tt.classList.remove('show');
  const box = document.getElementById('m-symbox');
  box.className = 'modal-sym-box ' + e[4];
  box.style.cssText = `background:var(--${e[4]});border-color:var(--${e[4]}-b);color:var(--${e[4]}-t)`;
  document.getElementById('m-num').textContent = e[0];
  document.getElementById('m-sym').textContent = e[1];
  document.getElementById('m-mass').textContent = e[3];
  document.getElementById('m-name').textContent = e[2];
  document.getElementById('m-cat').textContent = CAT_LABELS[e[4]] || e[5];
  document.getElementById('m-period').textContent = e[6];
  document.getElementById('m-group').textContent = e[7];
  document.getElementById('m-anum').textContent = e[0];
  document.getElementById('m-amass').textContent = e[3] + ' u';
  document.getElementById('m-block').textContent = (e[8] || '—').toUpperCase() + '-block';
  document.getElementById('m-state').textContent = e[9] || '—';
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal(ev) {
  if (ev.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('show');
  }
}

function makeSpacerDiv() {
  const d = document.createElement('div');
  d.className = 'spacer';
  return d;
}

// Build main table rows 1–7
for (let row = 1; row <= 7; row++) {
  if (row === 2 || row === 4) {
    const g = document.createElement('div'); g.className = 'gap-row'; grid.appendChild(g);
  }
  for (let col = 1; col <= 18; col++) {
    const e = map[row] ? map[row][col] : null;
    if (e) {
      grid.appendChild(makeCell(e));
    } else if ((row === 6 || row === 7) && col === 3) {
      const d = document.createElement('div');
      d.className = 'la-placeholder';
      d.textContent = row === 6 ? '57–71' : '89–103';
      grid.appendChild(d);
    } else {
      grid.appendChild(makeSpacerDiv());
    }
  }
}

// Separator
const sep = document.createElement('div'); sep.className = 'sep-row'; grid.appendChild(sep);

// Lanthanides (57–71)
for (let col = 1; col <= 18; col++) {
  if (col < 3) { grid.appendChild(makeSpacerDiv()); continue; }
  const num = 57 + (col - 3);
  if (num <= 71) {
    const e = ELEMENTS.find(x => x[0] === num);
    grid.appendChild(e ? makeCell(e) : makeSpacerDiv());
  } else {
    grid.appendChild(makeSpacerDiv());
  }
}

// Actinides (89–103)
for (let col = 1; col <= 18; col++) {
  if (col < 3) { grid.appendChild(makeSpacerDiv()); continue; }
  const num = 89 + (col - 3);
  if (num <= 103) {
    const e = ELEMENTS.find(x => x[0] === num);
    grid.appendChild(e ? makeCell(e) : makeSpacerDiv());
  } else {
    grid.appendChild(makeSpacerDiv());
  }
}
</script>
